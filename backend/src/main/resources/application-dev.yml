spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://ep-noisy-leaf-a1ssyg1b-pooler.ap-southeast-1.aws.neon.tech/backend?sslmode=require&channel_binding=require}
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:3}

  jpa:
    hibernate:
      ddl-auto: update      # auto-sync schema locally
    show-sql: true          # visible queries in dev
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:20MB}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}

app:
  cookie:
    secure: false
    same-site: Lax
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/redirect}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

logging:
  level:
    root: INFO
    finalproject.backend: DEBUG
    org.springframework.security: DEBUG  # see auth flow locally
    org.hibernate.SQL: DEBUG